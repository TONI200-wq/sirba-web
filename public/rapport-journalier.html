<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8" />
  <title>SIRBA — Rapport Journalier</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <!-- =========================
     HEADER DU SITE
  ========================= -->
  <header class="sirba-header">

    <div class="sirba-top-line"></div>

    <div class="sirba-header-main">

      <div class="sirba-left">
        <img src="images/logo.png" alt="Logo SIRBA" class="sirba-logo">

        <div class="sirba-title">
          <h1>RAPPORT JOURNALIER</h1>
          <span>SIRBA INDUSTRIES</span>
        </div>
      </div>

      <a href="centrale.html" class="btn sirba-back">← Retour</a>

    </div>

  </header>

  <!-- =========================
     FEUILLES EXCEL
  ========================= -->
  <section class="section">
    <h2>Feuilles de production</h2>
    <div id="sheets" class="excel-sheets"></div>
  </section>


  <!-- =========================
     FORMULAIRE RAPPORT
  ========================= -->

  <section class="section">

    <h2>Nouvelle production</h2>

    <form id="rapportForm" class="login-form livraison-form">

      <div class="form-group">
        <label>Date</label>
        <input type="date" id="dateProduction" required>
      </div>

      <div class="form-group">
        <label>Type de béton</label>
        <input type="text" id="typeBeton" required>
      </div>

      <div class="form-group">
        <label>Volume</label>
        <input type="number" id="volume" required>
      </div>

      <div class="form-group">
        <label>Clients</label>
        <input type="text" id="client" required>
      </div>

      <div class="form-group">
        <label>Ciment Lafarge</label>
        <input type="number" id="cimentLafarge">
      </div>

      <div class="form-group">
        <label>Ciment Cimbenin</label>
        <input type="number" id="cimentCimbenin">
      </div>

      <div class="form-group">
        <label>Ciment CHF</label>
        <input type="number" id="cimentCHF">
      </div>

      <div class="form-group">
        <label>Cumul GRA 1</label>
        <input type="number" id="gra1">
      </div>

      <div class="form-group">
        <label>Cumul GRA 2</label>
        <input type="number" id="gra2">
      </div>

      <div class="form-group">
        <label>Cumul GRA 3</label>
        <input type="number" id="gra3">
      </div>

      <div class="form-group">
        <label>Cumul GRA 4</label>
        <input type="number" id="gra4">
      </div>

      <div class="form-group">
        <label>Eau</label>
        <input type="number" id="eau">
      </div>

      <div class="form-group">
        <label>Aditif 1</label>
        <input type="number" id="adit1">
      </div>

      <div class="form-group">
        <label>Aditif 2</label>
        <input type="number" id="adit2">
      </div>

      <div class="form-group">
        <label>Aditif 3</label>
        <input type="number" id="adit3">
      </div>

      <div class="form-group">
        <label>Aditif 4</label>
        <input type="number" id="adit4">
      </div>

      <div class="form-group">
        <label>Aditif 5</label>
        <input type="number" id="adit5">
      </div>

      <div class="form-group">
        <label>Aditif 6</label>
        <input type="number" id="adit6">
      </div>

      <div class="form-group">
        <label>Aditif 7</label>
        <input type="number" id="adit7">
      </div>

      <div class="form-group">
        <label>Observations</label>
        <input type="text" id="observations">
      </div>

      <button type="submit">Valider</button>

      <button type="button" id="visualiserBtn">Visualiser</button>

    </form>

  </section>

  <script src="rapport-journalier.js"></script>

</body>

</html>
