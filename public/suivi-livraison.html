<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>SIRBA — Suivi livraison</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<!-- =========================
     HEADER DU SITE
========================= -->
<header class="sirba-header">

  <div class="sirba-top-line"></div>

  <div class="sirba-header-main">

    <div class="sirba-left">
      <img src="images/logo.png" alt="Logo SIRBA" class="sirba-logo">

      <div class="sirba-title">
        <h1>SUIVI LIVRAISON</h1>
        <span>SIRBA INDUSTRIES</span>
      </div>
    </div>

    <a href="centrale.html" class="btn sirba-back">← Retour</a>

  </div>

</header>

<!-- =========================
     PERIODE
========================= -->
<section class="section">
  <h2>Période</h2>
  <input type="month" id="periode" />
</section>

<!-- =========================
     FORMULAIRE
========================= -->
<section class="section">
  <h2>Nouvelle livraison</h2>

  <form id="livraisonForm" class="login-form livraison-form">

    <div class="form-group">
      <label>Client</label>
      <input type="text" id="client" placeholder="CLIENT" required>
    </div>
  
    <div class="form-group">
      <label>N° BC</label>
      <input type="text" id="bc" required>
    </div>
  
    <div class="form-group">
      <label>N° BE</label>
      <input type="text" id="be" required>
    </div>
  
    <div class="form-group">
      <label>Date de création</label>
      <input type="date" id="dateCreation" required>
    </div>
  
    <div class="form-group">
      <label>Date d'émission</label>
      <input type="date" id="dateEmission" required>
    </div>
  
    <div class="form-group">
      <label>Date de prévision pour livraison</label>
      <input type="date" id="datePrevision" required>
    </div>
  
    <div class="form-group">
      <label>Type produit</label>
      <input type="text" id="typeProduit" required>
    </div>
  
    <div class="form-group">
      <label>Désignation</label>
      <input type="text" id="designation" required>
    </div>
  
    <div class="form-group">
      <label>Quantité à enlever</label>
      <input type="number" id="quantiteEnlever" required>
    </div>
  
    <div class="form-group">
      <label>Date de livraison</label>
      <input type="date" id="dateLivraison" required>
    </div>
  
    <div class="form-group">
      <label>N° BL</label>
      <input type="text" id="bl" required>
    </div>
  
    <div class="form-group">
      <label>Quantité livrée</label>
      <input type="number" id="quantiteLivree" required>
    </div>
  
    <div class="form-group">
      <label>Heure de chargement</label>
      <input type="time" id="heureChargement" required>
    </div>
  
    <div class="form-group">
      <label>Slump test départ</label>
      <input type="text" id="slumpDepart" required>
    </div>
  
    <div class="form-group">
      <label>Transporteur</label>
      <input type="text" id="transporteur" required>
    </div>
  
    <div class="form-group">
      <label>N° Camion</label>
      <input type="text" id="camion" required>
    </div>
  
    <div class="form-group">
      <label>Nom conducteur</label>
      <input type="text" id="conducteur" required>
    </div>
  
    <div class="form-group">
      <label>Heure de départ</label>
      <input type="time" id="heureDepart" required>
    </div>
  
    <div class="form-group">
      <label>Heure d'arrivée</label>
      <input type="time" id="heureArrivee" required>
    </div>
  
    <div class="form-group">
      <label>Slump test arrivée</label>
      <input type="text" id="slumpArrivee" required>
    </div>
  
    <button type="submit">Valider</button>

    <button type="button" id="visualiserBtn">Visualiser</button>
  
  </form>   
</section>
